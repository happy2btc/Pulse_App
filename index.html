<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collective Pulse - Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .pulse-sphere {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #2dd4bf, #0d9488);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(45, 212, 191, 0.4);
            animation: pulse-animation 4s infinite ease-in-out;
            margin: 1rem 0;
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        .input-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #2dd4bf;
            border-radius: 10px;
            color: white;
            padding: 1rem;
            margin-bottom: 1rem;
            resize: none;
        }

        .send-button {
            background: #14b8a6;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        #pulseFeed {
            width: 100%;
            max-width: 500px;
            text-align: left;
        }

        .pulse-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-left: 4px solid #2dd4bf;
            margin-bottom: 10px;
            border-radius: 0 10px 10px 0;
        }

        .pulse-time {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="pulse-sphere"></div>
    <h1>COLLECTIVE PULSE</h1>

    <div class="input-container">
        <textarea id="pulseInput" placeholder="What's on your heart?"></textarea>
        <select id="issueSelect">
        <option value="General">General</option>
        <option value="UBI">UBI</option>
        <option value="Health Care">Health Care</option>
        <option value="Community">Community</option>
    </select>
        <button class="send-button" onclick="sendPulse()">Send to the Pulse</button>
    </div>

    <h3>Latest Heartbeats</h3>
    <div id="pulseFeed">Loading pulses...</div>

    <script>
        const SUPABASE_URL = 'https://ehpjfhqwjmpevneyaqty.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Z3OUyF9wFc0kEqllPdnqSQ_yRFjoqzp';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
       async function sendPulse() {
    const pulseInput = document.getElementById('pulseInput');
    const issueSelect = document.getElementById('issueSelect'); // Finds the dropdown
    const content = pulseInput.value;
    const issue = issueSelect.value; // Grabs the choice (UBI, etc.)

    if (!content) return; // Don't send empty messages!

    const { error } = await supabaseClient
        .from('pulse')
        .insert([{ 
            content: content, 
            issue: issue // This tells Supabase which "Issue" to file this under
        }]);

    if (error) {
        console.error("Error sending:", error);
    } else {
        pulseInput.value = ''; // Clears the text box
        fetchPulses(); // Refreshes the list immediately to show your new post
    }

                const card = document.createElement('div');
                card.className = 'pulse-card';
                card.innerHTML = `
            <div class="pulse-content">${pulse.content}</div>
            <div class="pulse-footer">
                <span class="pulse-time">${new Date(pulse.created_at).toLocaleString()}</span>

                </button>
            </div>

        }

        // The New "Like" Logic
        async function addLike(id, currentLikes) {
            const { error } = await supabaseClient
                .from('pulse')
                .update({ likes: currentLikes + 1 })
                .eq('id', id);

            if (error) {
                console.error('Error liking:', error);
            } else {
                fetchPulses(); // Refresh the list to show the new count!
            }
        }

        async function sendPulse() {
            const pulseInput = document.getElementById('pulseInput');
            const content = pulseInput.value;
            if (!content) return;

            const { error } = await supabaseClient
                .from('pulse')
                .insert([{ content: content }]);

            if (error) {
                console.error("Error sending:", error);
            } else {
                pulseInput.value = '';
                fetchPulses(); // Refresh the feed immediately!
            }
        }

        // This starts the heartbeat when the page opens
        fetchPulses();
    </script>
</body>

</html>
